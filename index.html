<!DOCTYPE HTML>
<html>
<head>
	<title>PitchFinder</title>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />

	<link rel="stylesheet" href="assets/css/main.css" />

	<!-- Leaflet (MAP) -->
	<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
	<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

	<style>
		#map {
			height: 500px;
			width: 100%;
			border-radius: 10px;
		}

		#controls {
			margin-bottom: 10px;
		}

		#controls input {
			margin-right: 10px;
		}
	</style>
</head>

<body class="is-preload">

<div id="wrapper">

	<!-- MAIN -->
	<div id="main">
		<div class="inner">

			<!-- HEADER (KEEP TEMPLATE STYLE) -->
			<header id="header">
				<a href="index.html" class="logo"><strong>PitchFinder</strong> Football Scout</a>
			</header>

			<!-- PITCHFINDER SECTION (REPLACED BANNER) -->
			<section>
				<header class="major">
					<h2>⚽ Find Football Pitches & Clubs Near You</h2>
				</header>

				<p>Search for clubs, academies, and request trials worldwide.</p>

				<div id="controls">
					<input id="search" placeholder="Search clubs..." />
					<input id="radius" type="range" min="1" max="20" value="5" />
					<span id="radiusValue">5 km</span>
					<button onclick="findMe()">📍 Find My Location</button>
				</div>

				<div id="map"></div>
			</section>

		</div>
	</div>

	<!-- SIDEBAR (UNCHANGED TEMPLATE MENU) -->
	<div id="sidebar">
		<div class="inner">

			<nav id="menu">
				<header class="major">
					<h2>Menu</h2>
				</header>

				<ul>
					<li><a href="index.html">Home</a></li>

					<li>
						<span class="opener">Explore</span>
						<ul>
							<li><a href="#map">Map</a></li>
							<li><a href="#controls">Search</a></li>
						</ul>
					</li>

					<li>
						<span class="opener">Info</span>
						<ul>
							<li><a href="#">About</a></li>
							<li><a href="#">Help</a></li>
							<li><a href="#">Guidelines</a></li>
						</ul>
					</li>
				</ul>
			</nav>

		</div>
	</div>

</div>

<!-- SCRIPTS -->
<script src="assets/js/jquery.min.js"></script>
<script src="assets/js/browser.min.js"></script>
<script src="assets/js/breakpoints.min.js"></script>
<script src="assets/js/util.js"></script>
<script src="assets/js/main.js"></script>

<script>
let map = L.map('map').setView([57.1497, -2.0943], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
	attribution: '&copy; OpenStreetMap'
}).addTo(map);

let userLatLng;
let userMarker;
let markers = [];

const clubs = [
	{ name: "Aberdeen Sports Village Academy", lat: 57.157, lng: -2.095, country: "UK", trials: true },
	{ name: "Sheddocksley FC", lat: 57.150, lng: -2.165, country: "UK", trials: true },
	{ name: "Real Madrid Youth Academy", lat: 40.4531, lng: -3.6883, country: "Spain", trials: false },
	{ name: "FC Barcelona Escola", lat: 41.3809, lng: 2.1228, country: "Spain", trials: false }
];

function distanceKm(a,b,c,d){
	const R = 6371;
	const dLat = (c-a) * Math.PI/180;
	const dLng = (d-b) * Math.PI/180;
	const x =
		Math.sin(dLat/2)**2 +
		Math.cos(a*Math.PI/180) *
		Math.cos(c*Math.PI/180) *
		Math.sin(dLng/2)**2;

	return 2 * R * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
}

function render(){
	markers.forEach(m => map.removeLayer(m));
	markers = [];

	const search = document.getElementById("search").value.toLowerCase();
	const radius = document.getElementById("radius").value;

	clubs.forEach(c => {
		if(search && !c.name.toLowerCase().includes(search)) return;

		if(userLatLng){
			if(distanceKm(userLatLng.lat,userLatLng.lng,c.lat,c.lng) > radius) return;
		}

		const popup = `
			<b>${c.name}</b><br>
			${c.country}<br><br>
			${c.trials ? "<button onclick='trial(\""+c.name+"\")'>Request Trial</button>" : "No trials"}
		`;

		markers.push(L.marker([c.lat,c.lng]).addTo(map).bindPopup(popup));
	});
}

function findMe(){
	navigator.geolocation.getCurrentPosition(pos=>{
		userLatLng = {
			lat: pos.coords.latitude,
			lng: pos.coords.longitude
		};

		map.setView(userLatLng, 14);

		if(userMarker) map.removeLayer(userMarker);

		userMarker = L.marker(userLatLng).addTo(map).bindPopup("You are here");
		render();
	});
}

function trial(name){
	alert("Trial request sent to " + name);
}

document.getElementById("search").addEventListener("input", render);

document.getElementById("radius").addEventListener("input", e=>{
	document.getElementById("radiusValue").innerText = e.target.value + " km";
	render();
});

render();
</script>

</body>
</html>
